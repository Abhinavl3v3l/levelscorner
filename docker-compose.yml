services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: levelscorner-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: levelscorner-backend
    environment:
      # Defaults to production; set APP_ENV=dev in .env for local dev
      - APP_ENV=${APP_ENV:-production}
      # Set in .env — never hardcode secrets here
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    networks:
      - app

  nginx:
    image: nginx:alpine
    container_name: levelscorner-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Defaults to production nginx (HTTPS). Set NGINX_CONF=nginx.dev.conf in .env for local dev.
      - ./nginx/${NGINX_CONF:-nginx.conf}:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - app

networks:
  app:
    driver: bridge

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: levelscorner-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: levelscorner-backend
    environment:
      - APP_ENV=dev
      # Override sensitive values via env vars — they take precedence over yaml
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
    networks:
      - app

  nginx:
    image: nginx:alpine
    container_name: levelscorner-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - app

networks:
  app:
    driver: bridge
